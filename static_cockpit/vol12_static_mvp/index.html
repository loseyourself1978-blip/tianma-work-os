<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TWOS Static Cockpit Vol.12.13</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="alternate" type="application/json" href="./twos_mvp_mock.json" />
</head>
<body>
  <main class="page" aria-label="TWOS Static Cockpit Vol.12.13">
    <header class="topbar">
      <p class="brand">TWOS</p>
      <p class="local-note">Static local MVP · file://</p>
    </header>

    <section class="landing" aria-label="TWOS new chat landing">
      <p class="version">Vol.12.13</p>
      <h1>One prompt.<br />Your AI team gets to work.</h1>
      <p class="subheadline">TWOS coordinates ChatGPT, Claude, Gemini, Grok, and more.</p>

      <form class="composer" method="get" action="../workspace_flow/create_workspace.html" aria-label="Create workspace from prompt">
        <input class="prompt-input" type="text" name="goal" value="Predict and review 2026 World Cup matches every day." aria-label="Workspace goal" />
        <button class="create-button" type="submit">Create Workspace</button>
      </form>

      <p class="hint">Ideas, tasks, research, writing, decisions, projects, recaps.</p>

      <div class="model-strip" aria-label="Static model strip">
        <p>ChatGPT · Claude · Gemini · Grok · more</p>
        <span>The AI team is generated for each task.</span>
      </div>
    </section>
  </main>
</body>
</html>
